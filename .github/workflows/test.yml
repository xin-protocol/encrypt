name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test node
        run: cd node && go test -race -timeout 120s ./...
      - name: Test client
        run: cd client && go test -race -timeout 120s ./...
