name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run golangci-lint
        run: |
          cd node
          go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run --enable errcheck,gosec,staticcheck --timeout 5m
